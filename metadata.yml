title: NYC Temp Model
databases:
  nyc_temp_log:
    path: nyc_temp_log.sqlite
    queries:
      latest_morning_snapshot: |-
        SELECT event_date, bracket_label, model_prob, market_price, edge,
               outcome, actual_max_f
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND event_date = (SELECT MAX(event_date) FROM bracket_snapshots
                            WHERE snapshot_type = 'morning')
        ORDER BY bracket_lower_f

      edge_summary_by_date: |-
        SELECT event_date,
               SUM(CASE WHEN edge > 0 THEN 1 ELSE 0 END) as positive_edge_brackets,
               SUM(CASE WHEN edge < 0 THEN 1 ELSE 0 END) as negative_edge_brackets,
               ROUND(AVG(edge), 4) as mean_edge,
               actual_max_f
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
        GROUP BY event_date
        ORDER BY event_date DESC

      missing_backfills: |-
        SELECT DISTINCT event_date
        FROM bracket_snapshots
        WHERE actual_max_f IS NULL
          AND event_date < date('now', '-1 day')
        ORDER BY event_date

      edge_by_bracket_position: |-
        SELECT bracket_label,
               ROUND(AVG(edge), 4) as mean_edge,
               ROUND(AVG(market_price), 4) as mean_market_price,
               COUNT(DISTINCT event_date) as n_days,
               ROUND(AVG(CASE WHEN outcome = 1 THEN 1.0 ELSE 0.0 END), 4)
                 as win_rate
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND outcome IS NOT NULL
        GROUP BY bracket_label
        ORDER BY mean_market_price DESC

      intraday_edge_decay: |-
        SELECT event_date,
               ROUND(hours_to_settle, 0) as hours_bucket,
               bracket_label,
               ROUND(AVG(edge), 4) as mean_edge,
               COUNT(*) as n_snapshots
        FROM bracket_snapshots
        WHERE snapshot_type = 'intraday'
        GROUP BY event_date, hours_bucket, bracket_label
        ORDER BY event_date DESC, hours_bucket DESC

      flb_test: |-
        SELECT
          CASE
            WHEN market_price >= 0.50 THEN 'expensive (>=50c)'
            WHEN market_price <= 0.15 THEN 'cheap (<=15c)'
            ELSE 'middle (15c-50c)'
          END as price_bucket,
          ROUND(AVG(edge), 4) as mean_edge,
          COUNT(*) as n_observations,
          ROUND(AVG(CASE WHEN outcome=1 THEN 1.0 ELSE 0.0 END), 4)
            as win_rate
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND outcome IS NOT NULL
        GROUP BY price_bucket

      todays_temp_trajectory: |-
        SELECT observation_ts, tmpf, wind_dir_deg, wind_speed_kt, sky_cover
        FROM metar_observations
        WHERE station = 'KNYC'
          AND observation_ts >= date('now', '-1 day')
        ORDER BY observation_ts

      peak_temp_by_date: |-
        SELECT date(observation_ts) as obs_date,
               MAX(tmpf) as metar_max_f,
               observation_ts as peak_time
        FROM metar_observations
        WHERE station = 'KNYC'
        GROUP BY obs_date
        ORDER BY obs_date DESC

      nbm_triplet_vs_quint_cdf: |-
        SELECT event_date,
               bracket_label,
               model_prob AS prob_quint_cdf,
               model_prob_triplet_cdf AS prob_triplet_cdf,
               ROUND(model_prob - model_prob_triplet_cdf, 5) AS prob_delta,
               nbm_p25_raw
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND model_prob_triplet_cdf IS NOT NULL
        ORDER BY event_date DESC, bracket_label

      edge_by_lead_time: |-
        SELECT
          CASE
            WHEN forecast_lead_hours < 12 THEN 'same-day (<12h)'
            WHEN forecast_lead_hours < 24 THEN 'short-lead (12-24h)'
            ELSE 'day-before (>24h)'
          END AS lead_bucket,
          ROUND(AVG(edge), 4) AS mean_edge,
          ROUND(AVG(ABS(edge)), 4) AS mean_abs_edge,
          COUNT(DISTINCT event_date) AS n_days,
          COUNT(*) AS n_observations,
          ROUND(AVG(market_price), 4) AS mean_mkt_price
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND edge IS NOT NULL
        GROUP BY lead_bucket
        ORDER BY lead_bucket

      edge_by_lead_and_bracket_type: |-
        SELECT
          CASE
            WHEN forecast_lead_hours < 12 THEN 'same-day'
            ELSE 'day-before'
          END AS lead_bucket,
          CASE
            WHEN market_price >= 0.50 THEN 'favorite (>=50c)'
            WHEN market_price <= 0.15 THEN 'tail (<=15c)'
            ELSE 'middle'
          END AS price_bucket,
          ROUND(AVG(edge), 4) AS mean_edge,
          COUNT(*) AS n
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND edge IS NOT NULL
        GROUP BY lead_bucket, price_bucket
        ORDER BY lead_bucket, price_bucket

      ensemble_spread_vs_abs_error: |-
        SELECT
          event_date,
          MAX(nbm_p90_adj - nbm_p10_adj) AS nbm_spread_adj_f,
          MAX(ens_gefs_spread_f) AS ens_gefs_spread_f,
          MAX(ens_ecmwf_spread_f) AS ens_ecmwf_spread_f,
          MAX(actual_max_f) AS actual_max_f,
          MAX(nbm_p50_adj) AS nbm_p50_adj,
          ROUND(ABS(MAX(actual_max_f) - MAX(nbm_p50_adj)), 2) AS abs_err_vs_nbm_p50
        FROM bracket_snapshots
        WHERE snapshot_type = 'morning'
          AND actual_max_f IS NOT NULL
        GROUP BY event_date
        HAVING MAX(ens_gefs_spread_f) IS NOT NULL OR MAX(ens_ecmwf_spread_f) IS NOT NULL
        ORDER BY event_date DESC

      intraday_brier_by_hour: |-
        SELECT
          CAST(ROUND((24 - hours_to_settle) / 1) AS INTEGER) AS approx_hour_et,
          COUNT(*) AS n_brackets,
          COUNT(DISTINCT event_date) AS n_days,
          ROUND(AVG((model_prob - outcome) * (model_prob - outcome)), 6) AS brier_score,
          ROUND(AVG(ABS(edge)), 4) AS mean_abs_edge
        FROM bracket_snapshots
        WHERE snapshot_type = 'intraday'
          AND outcome IS NOT NULL
        GROUP BY approx_hour_et
        ORDER BY approx_hour_et

      morning_vs_intraday_brier: |-
        SELECT
          m.event_date,
          ROUND(AVG((m.model_prob - m.outcome) * (m.model_prob - m.outcome)), 6) AS morning_brier,
          ROUND(AVG((i.model_prob - i.outcome) * (i.model_prob - i.outcome)), 6) AS best_intraday_brier,
          ROUND(AVG((m.model_prob - m.outcome) * (m.model_prob - m.outcome)), 6) -
            ROUND(AVG((i.model_prob - i.outcome) * (i.model_prob - i.outcome)), 6) AS brier_improvement
        FROM bracket_snapshots m
        JOIN (
          SELECT event_date, bracket_label, model_prob, outcome,
                 ROW_NUMBER() OVER (PARTITION BY event_date, bracket_label ORDER BY snapshot_ts DESC) AS rn
          FROM bracket_snapshots
          WHERE snapshot_type = 'intraday'
            AND outcome IS NOT NULL
            AND hours_to_settle BETWEEN 3 AND 8
        ) i
          ON m.event_date = i.event_date AND m.bracket_label = i.bracket_label AND i.rn = 1
        WHERE m.snapshot_type = 'morning'
          AND m.outcome IS NOT NULL
        GROUP BY m.event_date
        ORDER BY m.event_date DESC

      truncation_impact: |-
        SELECT
          event_date,
          snapshot_ts,
          observed_max_f_at_snapshot,
          SUM(CASE WHEN model_prob = 0.0 AND market_price > 0.01 THEN market_price ELSE 0 END) AS dead_bracket_mkt_value,
          SUM(CASE WHEN model_prob = 0.0 THEN 1 ELSE 0 END) AS n_zeroed_brackets,
          COUNT(*) AS n_total_brackets
        FROM bracket_snapshots
        WHERE snapshot_type = 'intraday'
          AND observed_max_f_at_snapshot IS NOT NULL
        GROUP BY event_date, snapshot_ts
        ORDER BY event_date DESC, snapshot_ts DESC

      hrrr_vs_nbm_accuracy: |-
        SELECT
          event_date,
          MAX(nbm_p50_adj) AS nbm_p50,
          MAX(hrrr_max_f) AS hrrr_max,
          MAX(actual_max_f) AS actual,
          ROUND(ABS(MAX(actual_max_f) - MAX(nbm_p50_adj)), 1) AS nbm_error,
          ROUND(ABS(MAX(actual_max_f) - MAX(hrrr_max_f)), 1) AS hrrr_error
        FROM bracket_snapshots
        WHERE snapshot_type = 'intraday'
          AND actual_max_f IS NOT NULL
          AND hrrr_max_f IS NOT NULL
        GROUP BY event_date
        ORDER BY event_date DESC

      metar_market_reaction: |-
        SELECT
          a.event_date,
          a.snapshot_ts AS metar_tick,
          a.bracket_label,
          a.observed_max_f_at_snapshot AS running_high,
          prev.snapshot_ts AS prior_tick,
          ROUND(a.market_price - prev.market_price, 3) AS price_delta,
          ROUND(a.edge, 3) AS edge_after,
          a.market_price AS mkt_after,
          prev.market_price AS mkt_before
        FROM bracket_snapshots a
        JOIN bracket_snapshots prev
          ON prev.event_date = a.event_date
          AND prev.bracket_label = a.bracket_label
          AND prev.snapshot_type = 'intraday'
          AND prev.snapshot_ts = (
            SELECT MAX(snapshot_ts) FROM bracket_snapshots
            WHERE event_date = a.event_date
              AND bracket_label = a.bracket_label
              AND snapshot_type = 'intraday'
              AND snapshot_ts < a.snapshot_ts
          )
        WHERE a.metar_new_obs = 1
          AND a.snapshot_type = 'intraday'
        ORDER BY a.event_date DESC, a.snapshot_ts DESC, a.bracket_label

      paper_pnl_daily: |-
        SELECT
          p.event_date,
          ROUND(SUM(p.pnl_net), 4) AS daily_pnl,
          ROUND(SUM(SUM(p.pnl_net)) OVER (ORDER BY p.event_date), 4) AS cumulative_pnl,
          COUNT(*) AS n_trades,
          SUM(CASE WHEN p.pnl_net > 0 THEN 1 ELSE 0 END) AS wins,
          SUM(CASE WHEN p.pnl_net <= 0 THEN 1 ELSE 0 END) AS losses
        FROM paper_positions p
        WHERE p.status IN ('exited', 'settled')
        GROUP BY p.event_date
        ORDER BY p.event_date

      paper_signal_quality: |-
        SELECT
          s.signal_type,
          COUNT(*) AS n_signals,
          SUM(CASE WHEN p.pnl_net > 0 THEN 1 ELSE 0 END) AS wins,
          SUM(CASE WHEN p.pnl_net <= 0 THEN 1 ELSE 0 END) AS losses,
          ROUND(AVG(p.pnl_net), 4) AS mean_pnl,
          ROUND(SUM(p.pnl_net), 4) AS total_pnl,
          ROUND(AVG(s.edge), 4) AS mean_edge_at_entry
        FROM intraday_signals s
        JOIN paper_positions p ON p.entry_signal_id = s.signal_id
        WHERE p.status IN ('exited', 'settled')
        GROUP BY s.signal_type
        ORDER BY s.signal_type

      paper_signal_decomposition: |-
        SELECT
          CASE
            WHEN s.reason LIKE 'dead bracket (truncation%' THEN 'truncation'
            WHEN s.reason LIKE 'dead bracket (model%'      THEN 'model_dead'
            WHEN s.hrrr_shift_f IS NOT NULL
              AND ABS(s.hrrr_shift_f) > 0.5              THEN 'hrrr_driven'
            WHEN s.trajectory_deviation_f IS NOT NULL
              AND ABS(s.trajectory_deviation_f) > 1.0    THEN 'trajectory_driven'
            WHEN s.ensemble_ratio IS NOT NULL
              AND ABS(s.ensemble_ratio - 1.0) > 0.15     THEN 'ensemble_driven'
            ELSE 'edge_only'
          END AS signal_source,
          COUNT(*) AS n,
          ROUND(AVG(p.pnl_net), 4) AS mean_pnl,
          ROUND(SUM(p.pnl_net), 4) AS total_pnl,
          SUM(CASE WHEN p.pnl_net > 0 THEN 1 ELSE 0 END) AS wins,
          SUM(CASE WHEN p.pnl_net <= 0 THEN 1 ELSE 0 END) AS losses
        FROM intraday_signals s
        JOIN paper_positions p ON p.entry_signal_id = s.signal_id
        WHERE p.status IN ('exited', 'settled')
        GROUP BY signal_source
        ORDER BY total_pnl DESC

      paper_open_positions: |-
        SELECT
          p.event_date,
          p.bracket_label,
          p.side,
          p.contracts,
          ROUND(p.avg_entry_price, 4) AS avg_entry_price,
          p.entry_ts,
          ROUND(p.entry_fee, 4) AS entry_fee
        FROM paper_positions p
        WHERE p.status = 'open'
        ORDER BY p.event_date, p.bracket_label

      paper_position_history: |-
        SELECT
          p.event_date,
          p.bracket_label,
          p.side,
          p.contracts,
          ROUND(p.avg_entry_price, 4) AS avg_entry_price,
          ROUND(p.exit_price, 4) AS exit_price,
          p.status,
          p.settlement_outcome,
          ROUND(p.pnl_gross, 4) AS pnl_gross,
          ROUND(p.pnl_net, 4) AS pnl_net,
          p.entry_ts,
          p.exit_ts
        FROM paper_positions p
        ORDER BY p.event_date DESC, p.entry_ts DESC

      market_as_probability_brier: |-
        SELECT
          snapshot_type,
          ROUND(AVG((model_prob - outcome) * (model_prob - outcome)), 6) AS model_brier,
          ROUND(AVG((market_price - outcome) * (market_price - outcome)), 6) AS market_brier,
          ROUND(
            AVG((model_prob - outcome) * (model_prob - outcome)) -
            AVG((market_price - outcome) * (market_price - outcome)),
            6
          ) AS model_minus_market,
          COUNT(*) AS n
        FROM bracket_snapshots
        WHERE outcome IS NOT NULL
        GROUP BY snapshot_type
        ORDER BY snapshot_type

      edge_by_city: |-
        SELECT
          COALESCE(series_ticker, 'KXHIGHNY') AS series_ticker,
          COUNT(DISTINCT event_date) AS n_days,
          ROUND(AVG(edge), 4) AS mean_edge,
          ROUND(AVG(ABS(edge)), 4) AS mean_abs_edge,
          ROUND(AVG((model_prob - outcome) * (model_prob - outcome)), 6) AS brier,
          ROUND(AVG((market_price - outcome) * (market_price - outcome)), 6) AS market_brier,
          COUNT(*) AS n_snapshots
        FROM bracket_snapshots
        WHERE snapshot_type = 'intraday'
          AND outcome IS NOT NULL
        GROUP BY COALESCE(series_ticker, 'KXHIGHNY')
        ORDER BY mean_edge DESC
